# versions.yaml - Single source of truth for MC container image versioning
# Format: Semantic Versioning 2.0.0 (https://semver.org)
# Last updated: 2026-02-10

# Image versioning - independent from MC CLI version
# Minor version (x.y) manually managed, patch version auto-calculated at build time from registry state
# Increments on any container change (tool updates, MC updates, Containerfile changes)
image:
  version: "1.0"

# MC CLI version bundled in container
# Synced with pyproject.toml version field
mc:
  version: "2.0.2"

# Container tools with full metadata
# Each tool entry contains: version, url (with {version} and {arch} placeholders), checksum, description
tools:
  ocm:
    version: "1.0.10"
    url: "https://github.com/openshift-online/ocm-cli/releases/download/v{version}/ocm-linux-{arch}"
    checksum: "sha256:e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"
    description: "OpenShift Cluster Manager CLI"
